version: 2
project_name: ctfcode

before:
  hooks:
    - go mod download

builds:
  - id: ctfcode
    main: ./cmd/ctfcode
    binary: ctfcode
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: ctfcode
    ids: [ctfcode]
    name_template: "ctfcode-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

