# =============================================================================
# Skills — 技能系统
# =============================================================================
[skills]
# paths = ["~/.ctfcode/skills"]   # 自定义 skill 路径
# 排除第三方 skill 目录中的噪音 README 文件，避免启动时大量警告
excluded_paths = [
    "~/.ctfcode/skills/01-code-audit",
    "~/.ctfcode/skills/02-threat-model",
    "~/.ctfcode/skills/03-ctf-web",
    "~/.ctfcode/skills/04-ctf-crypto",
    "~/.ctfcode/skills/05-rust",
    "~/.ctfcode/skills/06-write-skills",
    "~/.ctfcode/skills/07-php-audit",
    "~/.ctfcode/skills/08-java-audit",
    "~/.ctfcode/skills/09-red-blue",
    "~/.ctfcode/skills/10-reverse-engineering",
    "~/.ctfcode/skills/11-report",
    "~/.ctfcode/skills/12-domain-pentest",
    "~/.ctfcode/skills/13-wechat-miniapp",
    "~/.ctfcode/skills/14-mcp",
    "~/.ctfcode/skills/15-security-research",
    "~/.ctfcode/skills/16-fun",
]

# =============================================================================
# Permissions — 权限控制
# =============================================================================
[permissions]
mode = "accept"   # accept|reject|ask — 默认接受所有工具调用
# 以下白名单继承自 reasonix.toml（已合并）
allow = ["Bash(echo \"=== Nmap 端口扫描 (Top 1000) ===\" && nmap -sS -sV -T4 --top-ports 1000 -Pn 112.24.99.137 -oN /tmp/nmap_scan.txt 2>&1 | tail -30)", "explore"]

# =============================================================================
# Tools — 工具配置
# =============================================================================
[tools.shell]
prefer = "bash"
